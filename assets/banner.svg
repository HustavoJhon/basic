<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Glowing line -->
  <line x1="50" y1="170" x2="750" y2="170" stroke="url(#glow)" stroke-width="1"/>

  <!-- Ghost icon -->
  <g transform="translate(60, 45)">
    <path d="M25 0C11.2 0 0 11.2 0 25v35c0 2.8 2.2 5 5 5 1.4 0 2.6-.6 3.5-1.5C10 65.2 11.8 65 14 65h22c2.2 0 4-.2 5.5-1.5.9.9 2.1 1.5 3.5 1.5 2.8 0 5-2.2 5-5V25C50 11.2 38.8 0 25 0zm-10 35c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm20 0c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5z"
          fill="#F0F6FC" fill-rule="evenodd"/>
  </g>

  <!-- Name & tagline -->
  <text x="145" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#F0F6FC">hustavojhon</text>
  <text x="145" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#8b949e">Learning Lab • Documenting my growth</text>

  <!-- Tech badges -->
  <g transform="translate(145, 135)">
    <!-- JavaScript -->
    <rect x="0" y="0" width="78" height="24" rx="12" fill="#F7DF1E" fill-opacity="0.15"/>
    <text x="39" y="16" font-family="monospace" font-size="11" font-weight="600" fill="#F7DF1E" text-anchor="middle">JS</text>

    <!-- Go -->
    <rect x="88" y="0" width="40" height="24" rx="12" fill="#00ADD8" fill-opacity="0.15"/>
    <text x="108" y="16" font-family="monospace" font-size="11" font-weight="600" fill="#00ADD8" text-anchor="middle">Go</text>

    <!-- Docker -->
    <rect x="138" y="0" width="68" height="24" rx="12" fill="#2496ED" fill-opacity="0.15"/>
    <text x="172" y="16" font-family="monospace" font-size="11" font-weight="600" fill="#2496ED" text-anchor="middle">Docker</text>

    <!-- Linux -->
    <rect x="216" y="0" width="58" height="24" rx="12" fill="#FCC624" fill-opacity="0.15"/>
    <text x="245" y="16" font-family="monospace" font-size="11" font-weight="600" fill="#FCC624" text-anchor="middle">Linux</text>

    <!-- Java -->
    <rect x="284" y="0" width="50" height="24" rx="12" fill="#ED8B00" fill-opacity="0.15"/>
    <text x="309" y="16" font-family="monospace" font-size="11" font-weight="600" fill="#ED8B00" text-anchor="middle">Java</text>
  </g>

  <!-- Stats -->
  <g transform="translate(620, 60)">
    <text x="0" y="0" font-family="monospace" font-size="22" font-weight="700" fill="#F0F6FC" text-anchor="end">basic</text>
    <text x="0" y="20" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">learning repository</text>
  </g>
</svg>